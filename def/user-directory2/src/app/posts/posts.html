<div class="container">
  <h2>Posts</h2>

  <p *ngIf="loading">Loading posts...</p>

  <div class="list" *ngIf="!loading">
    <div class="card" *ngFor="let post of posts" (click)="goToPost(post.id)">
      <span class="num">#{{post.id}}</span>
      <p class="title">{{post.title}}</p>
    </div>
  </div>
</div>
